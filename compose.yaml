services:
  api:
    build: ./api
    ports:
      - 8080:8080
    environment:
      - POSTGRES_USER=student_user
      - POSTGRES_PASSWORD=student_password
      - POSTGRES_DATABASE=labo
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=postgres
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./web_new
    expose:
      - 5000
    environment:
      - VARIABLE=VALUE
    depends_on:
      - api

  nginx:
    build: ./nginx
    ports:
      - 80:80
    depends_on:
      - api
      - frontend

  postgres:
    image: postgres:17.0-alpine
    environment:
      - POSTGRES_USER=student_user
      - POSTGRES_PASSWORD=student_password
      - POSTGRES_DB=labo
    volumes:
      - postgres:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_user -d labo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres: